# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - justudy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: justudy
  NODE_VERSION: '22.x'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build standalone app
        run: npm run build

      - name: Package Azure standalone app
        run: npm run azure:package

      - name: Smoke test standalone app
        run: npm run azure:smoke

      - name: Test
        run: npm run test --if-present

      - name: Dependency audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: azure-package
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: azure-package

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_8B3410335EE74EBDA0840F5C0B2185D1 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_4F7D255E23774724A958C940B280A87D }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_0BB752E4EC34430CB6935B6A2BBB7DB2 }}

      - name: Configure Azure App Service
        run: |
          RESOURCE_GROUP="${{ vars.AZURE_RESOURCE_GROUP }}"
          if [ -z "$RESOURCE_GROUP" ]; then
            RESOURCE_GROUP="${{ secrets.AZURE_RESOURCE_GROUP }}"
          fi
          if [ -z "$RESOURCE_GROUP" ]; then
            RESOURCE_GROUP=$(az webapp list --query "[?name=='${{ env.AZURE_WEBAPP_NAME }}'].resourceGroup | [0]" -o tsv)
          fi

          if [ -z "$RESOURCE_GROUP" ]; then
            echo "Could not find resource group for Azure Web App '${{ env.AZURE_WEBAPP_NAME }}'."
            exit 1
          fi

          az webapp config appsettings set \
            --resource-group "$RESOURCE_GROUP" \
            --name "${{ env.AZURE_WEBAPP_NAME }}" \
            --settings \
              WEBSITE_NODE_DEFAULT_VERSION="~22" \
              SCM_DO_BUILD_DURING_DEPLOYMENT="false" \
              ENABLE_ORYX_BUILD="false" \
              NODE_ENV="production" \
              HOSTNAME="0.0.0.0"

          IS_LINUX=$(az webapp show \
            --resource-group "$RESOURCE_GROUP" \
            --name "${{ env.AZURE_WEBAPP_NAME }}" \
            --query reserved \
            -o tsv)

          if [ "$IS_LINUX" = "true" ]; then
            az webapp config set \
              --resource-group "$RESOURCE_GROUP" \
              --name "${{ env.AZURE_WEBAPP_NAME }}" \
              --linux-fx-version "NODE|22-lts" \
              --startup-file "node server.js"
          else
            az webapp config set \
              --resource-group "$RESOURCE_GROUP" \
              --name "${{ env.AZURE_WEBAPP_NAME }}" \
              --startup-file "node server.js"
          fi

      - name: Verify deployment package
        run: |
          test -f azure-package/server.js
          test -d azure-package/.next
          test -d azure-package/public
          test ! -f azure-package/.env
          test ! -f azure-package/.env.local

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: 'Production'
          package: azure-package
